server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    inetutils:
      ignored-interfaces:
        - tun* # Обычный префикс для VPN (Tunnel)
        - utun* # Для macOS
        - tap* # Для OpenVPN
        - vbe* # VirtualBox
        - virtual* # Прочие виртуальные интерфейсы
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:5173"
                  - "http://localhost:5174"
                  - "http://localhost:5175"
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - Authorization
                  - Content-Type
                  - Content-Disposition
                allowCredentials: true
                maxAge: 3600
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: admin-auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/admin/users/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: admin-field-service
              uri: lb://agriculture-field-service
              predicates:
                - Path=/api/admin/farms/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: agriculture-field-service
              uri: lb://agriculture-field-service
              predicates:
                - Path=/api/fields/**,/api/farms/**,/api/crop-type/**,/api/crop-variety/**,/api/crop-histories/**,/api/diseases/**,/api/disease-resistances/**,/api/crop-rotation/**,/api/disease-product-recommendations/**,/api/fertilizer-applications/**,/api/plant-protection/**,/api/phenological-observations/**,/api/plans/**,/api/audit/**,/api/reports/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: ndvi-service
              uri: lb://ndvi-service
              predicates:
                - Path=/api/ndvi/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: weather-service
              uri: lb://weather-service
              predicates:
                - Path=/api/open-meteo/**,/api/agro-data/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: ml-service-api
              uri: ${ML_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/api/yield/**,/api/price/**,/api/crop/recommend,/api/fertilizer/**,/api/pesticide/**,/api/disease/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

            - id: ml-service-health
              uri: ${ML_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/ml/health
              filters:
                - RewritePath=/ml/health, /health
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

jwt:
  secret: ${JWT_SECRET:aGroPlanProSuperSecretKeyForJwtSigningAtLeast256BitsLong!!}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true


services:

  redis:
    image: redis:7-alpine
    container_name: agro-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: agro-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_MULTIPLE_DATABASES: agro_plan,agro_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agro_plan"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: agro-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: agro-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:29092 1 30"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: agro-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: agro-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ML_SERVICE_URL: http://agro-ml:8090
      JWT_SECRET: ${JWT_SECRET:-aGroPlanProSuperSecretKeyForJwtSigningAtLeast256BitsLong!!}
    depends_on:
      eureka-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: agro-auth
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agro_auth
      DB_USER: admin
      DB_PASSWORD: admin
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-aGroPlanProSuperSecretKeyForJwtSigningAtLeast256BitsLong!!}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  agriculture-field-service:
    build:
      context: .
      dockerfile: agriculture-field-service/Dockerfile
    container_name: agro-field
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agro_plan
      DB_USERNAME: admin
      DB_PASSWORD: admin
      EUREKA_URL: http://eureka-server:8761/eureka/
      WEATHER_SERVICE_URL: http://weather-service:8082
      NDVI_SERVICE_URL: http://ndvi-service:8083
      ML_SERVICE_URL: http://agro-ml:8090
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  weather-service:
    build:
      context: .
      dockerfile: weather-service/Dockerfile
    container_name: agro-weather
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agro_plan
      DB_USERNAME: admin
      DB_PASSWORD: admin
      EUREKA_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  ndvi-service:
    build:
      context: .
      dockerfile: ndvi-service/Dockerfile
    container_name: agro-ndvi
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agro_plan
      DB_USERNAME: admin
      DB_PASSWORD: admin
      EUREKA_URL: http://eureka-server:8761/eureka/
      ML_SERVICE_URL: http://agro-ml:8090
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  agro-ml-service:
    build:
      context: ./agro-ml-service
    container_name: agro-ml
    ports:
      - "8090:8090"
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      MODELS_DIR: /app/models
      GEE_PROJECT: ${GEE_PROJECT:-ee-agroplan}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - C:/Users/nikit/.config/earthengine:/root/.config/earthengine:ro

volumes:
  postgres_data:

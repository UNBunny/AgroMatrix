server:
  port: 8085

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agro_auth}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}
  email: ${ADMIN_EMAIL:admin@agro.local}

jwt:
  secret: ${JWT_SECRET:aGroPlanProSuperSecretKeyForJwtSigningAtLeast256BitsLong!!}
  expiration-ms: ${JWT_EXPIRATION_MS:1800000}
  refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

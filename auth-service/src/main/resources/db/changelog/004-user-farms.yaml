databaseChangeLog:
  - changeSet:
      id: 004-user-farms
      author: auth-service
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: active_farm_id
                  type: BIGINT
        - createTable:
            tableName: user_farms
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: farm_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_farms
            columnNames: user_id, farm_id
            constraintName: pk_user_farms
        - addForeignKeyConstraint:
            baseTableName: user_farms
            baseColumnNames: user_id
            constraintName: fk_user_farms_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

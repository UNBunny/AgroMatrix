server:
  port: 8081


spring:
  application:
    name: agriculture-field-service
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jakarta.persistence.validation.mode: none
        types:
          spatial:
            enabled: true
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agro_plan}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  sql:
    init:
      mode: always

logging:
  level:
    org:
      springframework:
        transaction: INFO
        transaction.interceptor: WARN
      orm:
        jpa: INFO
        jpa.JpaTransactionManager: INFO
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: WARN

cache:
  max-size: 1000
  weather-climate:
    ttl-hours: 24
    max-size: 500
  yield-predictions:
    ttl-hours: 12
  price-predictions:
    ttl-hours: 12
  price-history:
    ttl-hours: 24
services:
  weather-service:
    base-url: ${WEATHER_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
    retry-timeout-ms: 130000
    max-retries: 2
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8090}
    base-path: /api
  ndvi-service:
    url: ${NDVI_SERVICE_URL:http://localhost:8083}
  agromonitoring:
    base-url: ${AGROMONITORING_URL:http://agromonitoring.com/agro/1.0}
    api-key: ${AGROMONITORING_API_KEY:demo-key}
    connect-timeout-ms: 5000
    read-timeout-ms: 30000


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true  # Использовать IP вместо hostname
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}

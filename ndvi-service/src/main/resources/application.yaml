server:
  port: 8083

spring:
  application:
    name: ndvi-service
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jakarta.persistence.validation.mode: none
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agro_plan}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    com.omstu.ndvi: INFO
    org.springframework.transaction: INFO

cache:
  max-size: 1000
  ndvi-current:
    ttl-hours: 24

services:
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8090}
    base-path: /api

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}
